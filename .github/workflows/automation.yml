name: Run Stock Automation

on:
  schedule:
    - cron: "10 10 * * 1-5"
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - run: pip install pandas yfinance gspread oauth2client

      - name: Run script
      env:
        GOOGLE_CREDS: ${{ secrets.GOOGLE_CREDS }}
      run: python update_google_sheet.py
